name: Question
description: Ask a question about Cerebro
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help! Check the [docs](https://github.com/Professor-Low/Cerebro/tree/main/docs) first.
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation / Setup
        - Configuration
        - MCP Tools
        - Memory Architecture
        - Cognitive Loop
        - Hooks
        - Docker / Deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context (OS, setup, what you've tried)
