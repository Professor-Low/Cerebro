# Ruff configuration for Cerebro Memory

line-length = 150

[lint]
ignore = [
    "E501",   # Line too long (cosmetic)
    "E722",   # Bare except (pervasive in codebase, safe patterns)
    "E402",   # Module-level import not at top (lazy imports are intentional)
    "E741",   # Ambiguous variable name (l, O, I)
    "F821",   # Undefined name (runtime-resolved imports)
    "F811",   # Redefined unused name
    "N806",   # Variable in function should be lowercase
]

select = ["E", "F", "N"]

[lint.per-file-ignores]
"src/ai_memory_ultimate.py" = ["F401"]
"src/maintenance/__init__.py" = ["F401"]
"src/reflection/__init__.py" = ["F401"]
